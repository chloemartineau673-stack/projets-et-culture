<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2d2d2d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Projets & Culture</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>🌸 Projets & Culture</h1>
    <nav class="tabs">
      <button class="tab active" onclick="showTab('accueil')">🏠 Accueil</button>
      <button class="tab" onclick="showTab('livres')">📚 Livres</button>
      <button class="tab" onclick="showTab('videos')">🎬 Vidéos</button>
      <button class="tab" onclick="showTab('visites')">🏛️ Visites</button>
    </nav>
  </header>

  <!-- ACCUEIL -->
  <main id="tab-accueil" class="tab-content active">

    <section class="card japan-card">
      <h2>✈️ Voyage au Japon</h2>
      <div class="progress-info">
        <span id="amount-display">0 €</span>
        <span>/ 10 000 €</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progress-fill"></div>
      </div>
      <p class="progress-percent" id="progress-percent">0%</p>
      <div class="add-amount">
        <input type="number" id="amount-input" placeholder="Montant en €" min="0" />
        <button onclick="addAmount()">Ajouter</button>
        <button class="btn-reset" onclick="resetAmount()">Réinitialiser</button>
      </div>
    </section>

    <section class="card">
      <h2>📚 Livres à lire</h2>
      <div class="add-item">
        <input type="text" id="book-input" placeholder="Ajouter un livre..." />
        <button onclick="addItem('books', 'book-input', 'book-list')">+</button>
      </div>
      <ul id="book-list" class="item-list"></ul>
    </section>

    <section class="card">
      <h2>🎬 Vidéos à regarder</h2>
      <div class="add-item">
        <input type="text" id="video-input" placeholder="Ajouter une vidéo..." />
        <button onclick="addItem('videos', 'video-input', 'video-list')">+</button>
      </div>
      <ul id="video-list" class="item-list"></ul>
    </section>

    <section class="card">
      <h2>🏛️ Visites culturelles</h2>
      <div class="add-item">
        <input type="text" id="visit-input" placeholder="Ajouter une visite..." />
        <button onclick="addItem('visits', 'visit-input', 'visit-list')">+</button>
      </div>
      <ul id="visit-list" class="item-list"></ul>
    </section>

  </main>

  <!-- ARCHIVES LIVRES -->
  <main id="tab-livres" class="tab-content">
    <div id="archive-books"></div>
  </main>

  <!-- ARCHIVES VIDÉOS -->
  <main id="tab-videos" class="tab-content">
    <div id="archive-videos"></div>
  </main>

  <!-- ARCHIVES VISITES -->
  <main id="tab-visites" class="tab-content">
    <div id="archive-visits"></div>
  </main>

  <script src="app.js"></script>
</body>
</html>
