<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2d2d2d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Projets & Culture</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="bg-icons"></div>

  <header>
    <h1>🌸 Projets & Culture</h1>
  </header>

  <!-- ACCUEIL -->
  <main id="tab-accueil" class="tab-content active">

    <section class="card japan-card">
      <h2>✈️ Voyage au Japon</h2>
      <div class="progress-info">
        <span id="amount-display">0 €</span>
        <span>/ 10 000 €</span>
      </div>
      <div class="japan-bar-wrap">
        <div class="japan-flag" id="japan-flag">
          <svg class="flag-svg" viewBox="0 0 36 28" xmlns="http://www.w3.org/2000/svg">
            <!-- Mât -->
            <line x1="2" y1="2" x2="2" y2="28" stroke="#888" stroke-width="2" stroke-linecap="round"/>
            <!-- Drapeau blanc avec animation flottement -->
            <g class="flag-wave">
              <rect x="3" y="2" width="33" height="20" rx="1.5" fill="white" stroke="#ddd" stroke-width="0.5"/>
              <circle cx="19.5" cy="12" r="6" fill="#bc002d"/>
            </g>
          </svg>
        </div>
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="progress-fill"></div>
        </div>
      </div>
      <p class="progress-percent" id="progress-percent">0%</p>
      <div class="add-amount">
        <input type="number" id="amount-input" placeholder="Montant en €" min="0" />
        <button onclick="addAmount()">Ajouter</button>
        <button class="btn-reset" onclick="resetAmount()">Réinitialiser</button>
      </div>
    </section>

    <div id="fireworks-container"></div>

    <section class="card">
      <h2>📚 Livres à lire</h2>
      <div class="add-item">
        <input type="text" id="book-input" placeholder="Ajouter un livre..." />
        <button onclick="addItem('books', 'book-input', 'book-list')">+</button>
      </div>
      <ul id="book-list" class="item-list"></ul>
    </section>

    <section class="card">
      <h2>🎬 Vidéos à regarder</h2>
      <div class="add-item">
        <input type="text" id="video-input" placeholder="Ajouter une vidéo..." />
        <button onclick="addItem('videos', 'video-input', 'video-list')">+</button>
      </div>
      <ul id="video-list" class="item-list"></ul>
    </section>

    <section class="card">
      <h2>🏛️ Visites culturelles</h2>
      <div class="add-item">
        <input type="text" id="visit-input" placeholder="Ajouter une visite..." />
        <button onclick="addItem('visits', 'visit-input', 'visit-list')">+</button>
      </div>
      <ul id="visit-list" class="item-list"></ul>
    </section>

  </main>

  <!-- ARCHIVES LIVRES -->
  <main id="tab-livres" class="tab-content">
    <div id="archive-books"></div>
  </main>

  <!-- ARCHIVES VIDÉOS -->
  <main id="tab-videos" class="tab-content">
    <div id="archive-videos"></div>
  </main>

  <!-- ARCHIVES VISITES -->
  <main id="tab-visites" class="tab-content">
    <div id="archive-visits"></div>
  </main>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="nav-btn active" onclick="showTab('accueil')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Accueil</span>
    </button>
    <button class="nav-btn" onclick="showTab('livres')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      <span>Livres</span>
    </button>
    <button class="nav-btn" onclick="showTab('videos')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="15" height="10" rx="2"/><polygon points="17 9 22 6 22 18 17 15"/></svg>
      <span>Vidéos</span>
    </button>
    <button class="nav-btn" onclick="showTab('visites')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="22" x2="21" y2="22"/><line x1="6" y1="18" x2="6" y2="11"/><line x1="10" y1="18" x2="10" y2="11"/><line x1="14" y1="18" x2="14" y2="11"/><line x1="18" y1="18" x2="18" y2="11"/><polygon points="12 2 20 7 4 7"/></svg>
      <span>Visites</span>
    </button>
  </nav>

  <script src="app.js"></script>
</body>
</html>
